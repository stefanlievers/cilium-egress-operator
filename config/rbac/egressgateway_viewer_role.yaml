# This rule is not used by the project cilium-egress-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to egress.cilium-egress-operator.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cilium-egress-operator
    app.kubernetes.io/managed-by: kustomize
  name: egressgateway-viewer-role
rules:
- apiGroups:
  - egress.cilium-egress-operator.io
  resources:
  - egressgateways
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - egress.cilium-egress-operator.io
  resources:
  - egressgateways/status
  verbs:
  - get
