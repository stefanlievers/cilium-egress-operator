name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the operational gap, not the solution — e.g. "when X happens I currently have to SSH into the node and ...".
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How you imagine it working; example YAML welcome.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you use today, or why existing features don't fit.
  - type: checkboxes
    id: checks
    attributes:
      label: Scope check
      options:
        - label: I checked the [roadmap](../../README.md#roadmap) and [ADRs](../../docs/adr/) and this isn't already planned or explicitly decided against.
