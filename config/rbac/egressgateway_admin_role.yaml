# This rule is not used by the project cilium-egress-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over egress.cilium-egress-operator.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cilium-egress-operator
    app.kubernetes.io/managed-by: kustomize
  name: egressgateway-admin-role
rules:
- apiGroups:
  - egress.cilium-egress-operator.io
  resources:
  - egressgateways
  verbs:
  - '*'
- apiGroups:
  - egress.cilium-egress-operator.io
  resources:
  - egressgateways/status
  verbs:
  - get
