# This rule is not used by the project cilium-egress-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the egress.cilium-egress-operator.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cilium-egress-operator
    app.kubernetes.io/managed-by: kustomize
  name: egressgateway-editor-role
rules:
- apiGroups:
  - egress.cilium-egress-operator.io
  resources:
  - egressgateways
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - egress.cilium-egress-operator.io
  resources:
  - egressgateways/status
  verbs:
  - get
